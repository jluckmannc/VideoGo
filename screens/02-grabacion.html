<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>VídeoGo · Grabación (integrado en Inicio)</title>
<style>
:root {
  --bg: #ffffff; --surface-dark: #171717; --surface-dark-elevated: #262626;
  --fg: #111827; --muted: #64748b; --border: #e5e7eb; --accent: #1d4ed8; --accent-on: #ffffff;
  --font-display: "Geist","Geist Sans",-apple-system,system-ui,"Segoe UI",Arial,sans-serif;
  --font-body: "Geist","Geist Sans",-apple-system,system-ui,"Segoe UI",Arial,sans-serif;
  --font-mono: "Fira Code",ui-monospace,"SF Mono","JetBrains Mono",Menlo,Monaco,Consolas,monospace;
  --radius-md: 8px; --radius-lg: 12px; --radius-pill: 9999px; --motion-fast: 150ms; --ease-standard: cubic-bezier(0.2,0,0,1);
  --recording-red: #dc2626;
}
*,*::before,*::after { box-sizing: border-box; }
body {
  margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
  background: #f1f5f9; font-family: var(--font-body); -webkit-font-smoothing: antialiased;
}
.phone {
  width: 390px; height: 844px; background: var(--bg); border-radius: 28px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15),0 0 0 1px rgba(0,0,0,0.06);
  display: flex; flex-direction: column; position: relative;
}
.msg {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 32px; text-align: center; gap: 16px;
}
.msg svg { width: 48px; height: 48px; color: var(--accent); opacity: 0.6; }
.msg h2 { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin: 0; }
.msg p { font-size: 14px; color: var(--muted); line-height: 1.6; margin: 0; max-width: 28ch; }
.msg .btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px;
  background: var(--accent); color: var(--accent-on); border-radius: var(--radius-md);
  font: inherit; font-size: 14px; font-weight: 600; border: none; cursor: pointer;
  text-decoration: none; transition: background var(--motion-fast) var(--ease-standard);
}
.msg .btn:hover { background: #2563eb; }
.msg .btn svg { width: 18px; height: 18px; color: var(--accent-on); opacity: 1; }
</style>
</head>
<body>
<div class="phone">
  <div class="msg">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    <h2>Grabación integrada</h2>
    <p>La pantalla de grabación ahora forma parte de Inicio. Presioná el botón rojo para comenzar a grabar desde ahí.</p>
    <a class="btn" href="../index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Ir a Inicio
    </a>
  </div>
</div>
</body>
</html>
