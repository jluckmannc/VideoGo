<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VídeoGo · Detalle</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/brand/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../assets/brand/favicon-16.png">

<link rel="manifest" href="../assets/brand/site.webmanifest">

<style>
:root {
  --bg: #0a0a14;
  --surface: #12121e;
  --surface-elevated: #1a1a2a;
  --fg: #f1f5f9;
  --muted: #94a3b8;
  --border: rgba(255,255,255,0.06);
  --accent: #1d4ed8;
  --accent-on: #ffffff;
  --accent-hover: #2563eb;
  --accent-active: #1e40af;
  --success: #16a34a;
  --warn: #d97706;
  --danger: #dc2626;
  --punch-hole: #000000;
  --font-display: "Geist","Geist Sans",-apple-system,system-ui,"Segoe UI",Arial,sans-serif;
  --font-body: "Geist","Geist Sans",-apple-system,system-ui,"Segoe UI",Arial,sans-serif;
  --font-mono: "Fira Code",ui-monospace,"SF Mono","JetBrains Mono",Menlo,Monaco,Consolas,monospace;
  --text-xs: 12px;
  --text-sm: 14px;
  --text-base: 16px;
  --text-lg: 20px;
  --text-xl: 24px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 14px;
  --radius-pill: 9999px;
  --motion-fast: 150ms;
  --motion-base: 200ms;
  --ease-standard: cubic-bezier(0.2,0,0,1);
}
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;
  background:#05050e;font-family:var(--font-body);-webkit-font-smoothing:antialiased;
}
.phone{
  width:390px;height:844px;background:var(--bg);border-radius:28px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.04);
  display:flex;flex-direction:column;position:relative;
}
.status-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 24px 8px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.9);flex-shrink:0;
}
.status-icons{display:flex;gap:6px;align-items:center}
.status-icons svg{width:16px;height:16px;stroke:rgba(255,255,255,0.9)}
.punch-hole{
  width:10px;height:10px;background:var(--punch-hole);border-radius:50%;
  position:absolute;top:16px;left:50%;margin-left:-5px;z-index:3;
}
.detail-header{
  display:flex;align-items:center;gap:12px;padding:4px 20px 8px;flex-shrink:0;
}
.detail-header .back-btn{
  background:none;border:none;padding:4px;cursor:pointer;color:rgba(255,255,255,0.7);display:flex;
  transition:color var(--motion-fast) var(--ease-standard);
}
.detail-header .back-btn:hover{color:white}
.detail-header .back-btn svg{width:22px;height:22px}
.detail-header h1{
  font-family:var(--font-display);font-size:var(--text-lg);font-weight:700;
  margin:0;color:var(--fg);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.player-area{
  position:relative;width:100%;aspect-ratio:16/9;
  background:linear-gradient(135deg,#0f0f1e,#1a1a2e);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;
}
.player-area .player-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,0.3) 0%,transparent 35%,transparent 65%,rgba(0,0,0,0.5) 100%);
  pointer-events:none;z-index:1;
}
.player-area .play-btn{
  width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.1);
  backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.08);cursor:pointer;display:flex;
  align-items:center;justify-content:center;z-index:2;
  transition:background var(--motion-fast) var(--ease-standard),transform var(--motion-fast) var(--ease-standard);
}
.player-area .play-btn:hover{background:rgba(255,255,255,0.18)}
.player-area .play-btn:active{transform:scale(0.92)}
.player-area .play-btn svg{width:24px;height:24px;color:white;margin-left:2px}
.progress-bar{
  position:absolute;bottom:0;left:0;right:0;padding:10px 16px;z-index:2;
  display:flex;align-items:center;gap:8px;
}
.progress-track{flex:1;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;overflow:hidden;display:flex}
.progress-track .fill{width:35%;height:100%;background:var(--accent);border-radius:2px;position:relative}
.progress-track .fill::after{
  content:'';position:absolute;right:-4px;top:-3.5px;
  width:10px;height:10px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 8px color-mix(in oklab,var(--accent) 60%,transparent);
}
.progress-time{
  font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.6);font-variant-numeric:tabular-nums;
}
.video-info{
  padding:16px 20px 0;display:flex;flex-direction:column;gap:12px;flex:1;overflow-y:auto;
}
.info-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;
  background:var(--surface);border-radius:var(--radius-lg);
  padding:16px;border:1px solid var(--border);
}
.info-cell{display:flex;flex-direction:column;gap:2px}
.info-cell .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;font-weight:500}
.info-cell .value{font-size:var(--text-sm);font-weight:600;color:var(--fg)}
.info-cell .badge{
  display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;
  padding:2px 10px;border-radius:var(--radius-pill);margin-top:2px;
}
.badge.success{background:rgba(22,163,74,0.1);color:var(--success)}
.badge .dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
.moments-section{
  background:var(--surface);border-radius:var(--radius-lg);padding:14px 16px;
  border:1px solid var(--border);
}
.moments-section .section-label{
  font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.05em;margin:0 0 10px;
}
.moment-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px 6px 8px;background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius-pill);
  font-size:12px;color:var(--fg);font-weight:500;margin-right:6px;margin-bottom:6px;
}
.moment-chip svg{width:12px;height:12px;color:var(--warn)}
.moment-chip .time{font-family:var(--font-mono);color:var(--muted);font-weight:400;font-size:11px}
.cta-buttons{display:flex;gap:10px;padding:4px 0 8px}
.cta-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 16px;border-radius:var(--radius-md);border:none;font:inherit;
  font-size:var(--text-sm);font-weight:600;cursor:pointer;
  transition:background var(--motion-fast) var(--ease-standard),transform var(--motion-fast) var(--ease-standard);
}
.cta-btn:active{transform:scale(0.97)}
.cta-btn svg{width:18px;height:18px}
.cta-btn.primary{background:var(--accent);color:var(--accent-on)}
.cta-btn.primary:hover{background:var(--accent-hover)}
.cta-btn.ghost{background:rgba(255,255,255,0.05);color:var(--fg);border:1px solid var(--border)}
.cta-btn.ghost:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.1)}
.bottom-nav{
  display:flex;border-top:1px solid rgba(255,255,255,0.04);
  padding:8px 0 10px;flex-shrink:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(12px);
}
.bottom-nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;
  cursor:pointer;color:rgba(255,255,255,0.35);
  transition:color var(--motion-fast) var(--ease-standard);
  border:none;background:none;font-family:inherit;
}
.bottom-nav-item.active{color:white}
.bottom-nav-item.active svg{color:white}
.bottom-nav-item svg{width:24px;height:24px;color:rgba(255,255,255,0.35)}
.bottom-nav-item span{font-size:10px;font-weight:500}
.android-nav{
  display:flex;justify-content:center;gap:24px;
  padding:6px 20px 8px;flex-shrink:0;
  background:rgba(0,0,0,0.2);backdrop-filter:blur(12px);
}
.android-nav svg{width:16px;height:16px;color:rgba(255,255,255,0.35)}
</style>
</head>
