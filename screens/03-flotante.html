<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VídeoGo · Modo flotante</title>
<style>
:root {
  --bg: #0a0a14;
  --surface: #12121e;
  --fg: #f1f5f9;
  --muted: #94a3b8;
  --border: rgba(255,255,255,0.06);
  --accent: #1d4ed8;
  --accent-on: #ffffff;
  --punch-hole: #000000;
  --font-display: "Geist","Geist Sans",-apple-system,system-ui,"Segoe UI",Arial,sans-serif;
  --font-body: "Geist","Geist Sans",-apple-system,system-ui,"Segoe UI",Arial,sans-serif;
  --recording-red: #dc2626;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 14px;
  --radius-pill: 9999px;
  --motion-fast: 150ms;
  --motion-base: 200ms;
  --ease-standard: cubic-bezier(0.2,0,0,1);
}
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;
  background:#05050e;font-family:var(--font-body);-webkit-font-smoothing:antialiased;
}
.phone{
  width:390px;height:844px;background:var(--bg);border-radius:28px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.04);
  display:flex;flex-direction:column;position:relative;
}
.status-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 24px 8px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.9);flex-shrink:0;
}
.status-icons{display:flex;gap:6px;align-items:center}
.status-icons svg{width:16px;height:16px;stroke:rgba(255,255,255,0.9)}
.punch-hole{
  width:10px;height:10px;background:var(--punch-hole);border-radius:50%;
  position:absolute;top:16px;left:50%;margin-left:-5px;z-index:3;
}
.notification-bar{
  display:flex;align-items:center;gap:8px;
  padding:6px 16px;background:#0a0a14;border-bottom:1px solid rgba(255,255,255,0.04);
  flex-shrink:0;cursor:pointer;position:relative;z-index:15;
  transition:background var(--motion-fast) var(--ease-standard);
}
.notification-bar:active{background:rgba(255,255,255,0.04)}
.notification-bar .notif-icon{
  width:20px;height:20px;flex-shrink:0;position:relative;
}
.notification-bar .notif-icon svg{width:100%;height:100%;color:var(--recording-red)}
.notification-bar .notif-icon .dot{
  position:absolute;top:-1px;right:-1px;width:6px;height:6px;
  border-radius:50%;background:var(--recording-red);
  animation:pulse-dot 1.2s ease-in-out infinite;
}
.notification-bar .notif-text{flex:1;font-size:12px;color:rgba(255,255,255,0.65)}
.notification-bar .notif-text strong{color:white}
.notification-bar .notif-chevron{
  width:16px;height:16px;color:rgba(255,255,255,0.4);
  transition:transform var(--motion-base) var(--ease-standard);
}
.notification-bar .notif-chevron.open{transform:rotate(180deg)}

.app-content{
  flex:1;position:relative;overflow:hidden;display:flex;
}
.maps-app{
  flex:1;background:#0f172a;display:flex;flex-direction:column;position:relative;
}
.maps-header{
  display:flex;align-items:center;gap:8px;padding:8px 16px;
  background:rgba(15,23,42,0.95);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0;
}
.maps-header svg{width:20px;height:20px;color:var(--muted);flex-shrink:0}
.maps-search{
  flex:1;padding:8px 12px;background:rgba(255,255,255,0.06);
  border-radius:var(--radius-md);font-size:13px;color:var(--muted);
  display:flex;align-items:center;gap:6px;
}
.maps-search svg{width:14px;height:14px}
.maps-canvas{
  flex:1;position:relative;display:flex;align-items:center;justify-content:center;
  background:
    linear-gradient(180deg, #0f172a 0%, #1e293b 20%, #0f172a 40%, #1a2332 55%, #0f172a 75%, #0a0f1a 100%);
}
.maps-canvas .road{
  position:absolute;left:50%;top:0;bottom:0;width:2px;
  background:rgba(255,255,255,0.03);transform:translateX(-50%);
}
.maps-canvas .road::before{
  content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;
  background:rgba(255,255,255,0.02)
}
.maps-canvas .road::after{
  content:'';position:absolute;left:-6px;top:0;bottom:0;width:2px;
  background:rgba(255,255,255,0.02)
}
.maps-canvas .route-line{
  position:absolute;top:30%;left:20%;right:30%;height:3px;
  background:var(--accent);border-radius:2px;opacity:0.4;
}
.maps-canvas .route-line::after{
  content:'';position:absolute;right:-5px;top:-3.5px;
  border:5px solid transparent;border-left-color:var(--accent);border-right:0;
}
.maps-canvas .pin{
  position:absolute;width:20px;height:28px;color:var(--accent);
}
.maps-canvas .pin.dest{bottom:35%;right:25%}
.maps-canvas .pin svg{width:100%;height:100%}
.maps-eta{
  position:absolute;bottom:16px;left:16px;right:16px;
  background:rgba(15,23,42,0.95);backdrop-filter:blur(12px);
  padding:12px 16px;border-radius:var(--radius-lg);
  border:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;gap:12px;z-index:5;
}
.maps-eta .eta-icon{width:36px;height:36px;flex-shrink:0}
.maps-eta .eta-icon svg{width:100%;height:100%;color:var(--accent)}
.maps-eta .eta-info{flex:1}
.maps-eta .eta-time{font-size:var(--text-sm,14px);font-weight:700;color:var(--fg)}
.maps-eta .eta-detail{font-size:11px;color:var(--muted)}

@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.3}}

.pip-video{
  position:absolute;right:16px;top:16px;
  width:120px;height:160px;border-radius:var(--radius-lg);
  overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);
  z-index:11;border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;transition:transform var(--motion-fast) var(--ease-standard),opacity var(--motion-base) var(--ease-standard);
}
.pip-video:active{transform:scale(0.95)}
.pip-video.hidden{opacity:0;pointer-events:none;transform:scale(0.8)}
.pip-video .pip-bg{
  width:100%;height:100%;position:relative;
  background:linear-gradient(180deg,#0a0a14 0%,#12121e 15%,#1a1a2e 28%,#2a2a3e 35%,#3a3a4e 42%,#2a2a3e 50%,#0a0a14 52%);
}
.pip-video .pip-bg::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent,transparent 30px,rgba(255,255,255,0.015) 30px,rgba(255,255,255,0.015) 31px);
}
.pip-video .pip-rec-indicator{
  position:absolute;top:6px;left:8px;display:flex;align-items:center;gap:4px;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);padding:2px 8px;border-radius:var(--radius-pill);
  z-index:3;
}
.pip-video .pip-rec-indicator .dot{
  width:6px;height:6px;border-radius:50%;background:var(--recording-red);
  animation:pulse-dot 1.2s ease-in-out infinite;
}
.pip-video .pip-rec-indicator span{
  font-size:9px;color:white;font-family:"Fira Code",monospace;font-variant-numeric:tabular-nums;
}
.pip-video .pip-swipe-hint{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  width:24px;height:3px;background:rgba(255,255,255,0.2);border-radius:2px;
}
.pip-video .pip-close{
  position:absolute;top:6px;right:6px;width:20px;height:20px;
  background:rgba(0,0,0,0.5);border:none;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:white;z-index:4;
  transition:background var(--motion-fast) var(--ease-standard);
}
.pip-video .pip-close:hover{background:rgba(0,0,0,0.75)}
.pip-video .pip-close svg{width:12px;height:12px}

.pip-expand-overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity var(--motion-fast) var(--ease-standard);
  z-index:5;border-radius:var(--radius-lg);
}
.pip-video.show-expand .pip-expand-overlay{opacity:1;pointer-events:auto}
.pip-expand-btn{
  width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.2);color:white;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background var(--motion-fast) var(--ease-standard),transform var(--motion-fast) var(--ease-standard);
}
.pip-expand-btn:active{transform:scale(0.85);background:rgba(255,255,255,0.25)}
.pip-expand-btn svg{width:18px;height:18px}

.notification-shade{
  position:absolute;inset:0;z-index:20;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);
  display:flex;flex-direction:column;align-items:stretch;
  opacity:0;pointer-events:none;transition:opacity var(--motion-base) var(--ease-standard);
  padding-top:60px;
}
.notification-shade.open{opacity:1;pointer-events:auto}
.notif-shade-handle{
  width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;
  margin:0 auto 16px;
}
.notif-shade-card{
  margin:0 16px;background:var(--surface);border-radius:var(--radius-lg);
  border:1px solid var(--border);overflow:hidden;
}
.notif-shade-card .nsc-header{
  display:flex;align-items:center;gap:12px;padding:16px;
  background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border);
}
.notif-shade-card .nsc-header .nsc-icon{
  width:36px;height:36px;border-radius:var(--radius-md);
  background:var(--recording-red);display:flex;align-items:center;justify-content:center;
}
.notif-shade-card .nsc-header .nsc-icon svg{width:20px;height:20px;color:white}
.notif-shade-card .nsc-header .nsc-info{flex:1}
.notif-shade-card .nsc-header .nsc-info strong{display:block;font-size:14px;color:var(--fg)}
.notif-shade-card .nsc-header .nsc-info span{font-size:11px;color:var(--muted)}
.notif-shade-card .nsc-body{
  padding:12px 16px;display:flex;gap:8px;
}
.notif-shade-card .nsc-body .nsc-btn{
  flex:1;padding:10px;border:none;border-radius:var(--radius-md);
  font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;
  transition:background var(--motion-fast) var(--ease-standard);
}
.notif-shade-card .nsc-body .nsc-btn.primary{background:var(--accent);color:white}
.notif-shade-card .nsc-body .nsc-btn.primary:active{background:#1e40af}
.notif-shade-card .nsc-body .nsc-btn.ghost{background:rgba(255,255,255,0.06);color:var(--fg)}
.notif-shade-card .nsc-body .nsc-btn.ghost:active{background:rgba(255,255,255,0.1)}
</style>
</head>
<body>
<div class="phone">
  <div class="punch-hole"></div>
  <div class="status-bar">
    <span class="time">14:38</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M1 9l4 4-4 4"/><path d="M7 17l4-4-4-4"/><rect x="11" y="5" width="10" height="14" rx="2"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 7h16"/></svg>
    </div>
  </div>

  <div class="notification-bar" onclick="toggleShade()">
    <div class="notif-icon">
      <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
      <div class="dot"></div>
    </div>
    <span class="notif-text"><strong id="notif-title">VídeoGo</strong> · <span id="notif-sub">Grabando · 00:12:37</span></span>
    <svg class="notif-chevron" id="notifChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
  </div>

  <div class="app-content">
    <div class="maps-app">
      <div class="maps-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="4" x2="20" y2="20"/><line x1="4" y1="20" x2="20" y2="4"/></svg>
        <div class="maps-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          Av. Cabildo 3200, CABA
        </div>
      </div>
      <div class="maps-canvas">
        <div class="road"></div>
        <div class="route-line"></div>
        <div class="pin dest">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
        </div>
      </div>
      <div class="maps-eta">
        <div class="eta-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v4M12 22v-4M2 12h4M22 12h-4"/><path d="M12 6a6 6 0 100 12 6 6 0 000-12z"/></svg>
        </div>
        <div class="eta-info">
          <div class="eta-time">12 min · 5.2 km</div>
          <div class="eta-detail">Llegada: 14:50 · Tránsito normal</div>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="var(--muted)"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>

    <div class="pip-video" id="pipVideo">
      <div class="pip-bg" onclick="toggleExpand(event)">
        <div class="pip-rec-indicator">
          <div class="dot"></div>
          <span>00:12:37</span>
        </div>
        <div class="pip-swipe-hint"></div>

        <div class="pip-expand-overlay">
          <button class="pip-expand-btn" onclick="goFullScreen(event)" title="Volver a pantalla completa">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="15 3 21 3 21 9"/>
              <polyline points="9 21 3 21 3 15"/>
              <line x1="21" y1="3" x2="14" y2="10"/>
              <line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="pip-close" onclick="closePip(event)" title="Cerrar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div class="notification-shade" id="notifShade" onclick="closeShade(event)">
    <div class="notif-shade-handle"></div>
    <div class="notif-shade-card" onclick="event.stopPropagation()">
      <div class="nsc-header">
        <div class="nsc-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
        </div>
        <div class="nsc-info">
          <strong>VídeoGo</strong>
          <span>Grabando · 00:12:37</span>
        </div>
      </div>
      <div class="nsc-body">
        <button class="nsc-btn primary" onclick="goFullScreen(event)">Volver a la grabación</button>
        <button class="nsc-btn ghost" onclick="closeShade(event);stopRecording()">Detener grabación</button>
      </div>
    </div>
  </div>

</div>
<script>
var isShowingExpand = false;

function toggleExpand(e) {
  e.stopPropagation();
  var pip = document.getElementById('pipVideo');
  isShowingExpand = !isShowingExpand;
  pip.classList.toggle('show-expand', isShowingExpand);
}

function goFullScreen(e) {
  if (e) e.stopPropagation();
  window.location.href = '../index.html?mode=recording';
}

function closePip(e) {
  e.stopPropagation();
  var pip = document.getElementById('pipVideo');
  pip.classList.add('hidden');
  isShowingExpand = false;
  pip.classList.remove('show-expand');
  document.getElementById('notif-sub').textContent = 'Grabando · Toca para volver';
  document.getElementById('notif-title').textContent = 'VídeoGo (minimizado)';
}

function toggleShade() {
  var shade = document.getElementById('notifShade');
  var chevron = document.getElementById('notifChevron');
  var open = shade.classList.toggle('open');
  chevron.classList.toggle('open', open);
}

function closeShade(e) {
  var shade = document.getElementById('notifShade');
  shade.classList.remove('open');
  document.getElementById('notifChevron').classList.remove('open');
  if (e) e.stopPropagation();
}

function stopRecording() {
  window.location.href = '04-historial.html';
}

document.addEventListener('click', function(e) {
  var pip = document.getElementById('pipVideo');
  if (isShowingExpand && !pip.contains(e.target) && !e.target.closest('.notification-shade')) {
    isShowingExpand = false;
    pip.classList.remove('show-expand');
  }
});
</script>
</body>
</html>
