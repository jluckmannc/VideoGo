<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VídeoGo · Contactos SOS</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/brand/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../assets/brand/favicon-16.png">
<link rel="apple-touch-icon" href="../assets/brand/apple-touch-icon.png">
<link rel="manifest" href="../assets/brand/site.webmanifest">

<style>
:root {
  --bg: #0a0a14;
  --surface: #12121e;
  --fg: #f1f5f9;
  --muted: #94a3b8;
  --border: rgba(255,255,255,0.06);
  --accent: #1d4ed8;
  --danger: #dc2626;
  --font-display: "Geist","Geist Sans",-apple-system,system-ui,"Segoe UI",Arial,sans-serif;
  --font-body: "Geist","Geist Sans",-apple-system,system-ui,"Segoe UI",Arial,sans-serif;
  --text-xs: 12px;
  --text-sm: 14px;
  --text-base: 16px;
  --text-lg: 20px;
  --text-xl: 24px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-6: 24px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-pill: 9999px;
  --motion-fast: 150ms;
  --motion-base: 200ms;
  --ease-standard: cubic-bezier(0.2,0,0,1);
}

*,*::before,*::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #05050e;
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

.phone {
  width: min(390px, 100vw);
  height: min(844px, 100vh);
  background: var(--bg);
  border-radius: min(28px, 6vw);
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
  display: flex;
  flex-direction: column;
  position: relative;
}

.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px 8px;
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  flex-shrink: 0;
}

.status-icons {
  display: flex;
  gap: 6px;
  align-items: center;
}

.status-icons svg {
  width: 16px;
  height: 16px;
  stroke: rgba(255,255,255,0.9);
}

.punch-hole {
  width: 10px;
  height: 10px;
  background: black;
  border-radius: 50%;
  position: absolute;
  top: 16px;
  left: 50%;
  margin-left: -5px;
  z-index: 3;
}

.page-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 4px 20px 8px;
  flex-shrink: 0;
}
.page-title {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}
.page-logo {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  object-fit: cover;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.12);
  flex-shrink: 0;
}

.page-header .back-btn {
  background: none;
  border: none;
  padding: 4px;
  cursor: pointer;
  color: rgba(255,255,255,0.7);
  display: flex;
  transition: color var(--motion-fast) var(--ease-standard);
}

.page-header .back-btn:hover {
  color: white;
}

.page-header .back-btn svg {
  width: 22px;
  height: 22px;
}

.page-header h1 {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 700;
  margin: 0;
  color: var(--fg);
}

.page-header .add-btn {
  background: var(--accent);
  border: none;
  padding: 6px 12px;
  border-radius: var(--radius-md);
  color: white;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  transition: all var(--motion-fast) var(--ease-standard);
  display: flex;
  align-items: center;
  gap: 4px;
}

.page-header .add-btn:hover {
  background: var(--accent-hover);
}

.page-header .add-btn:active {
  transform: scale(0.95);
}

.page-header .add-btn svg {
  width: 16px;
  height: 16px;
}

.content-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scrollbar-width: none;
}

.content-scroll::-webkit-scrollbar {
  display: none;
}

.contact-list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px 14px;
  transition: all var(--motion-fast) var(--ease-standard);
}

.contact-list-item:hover {
  background: rgba(18, 18, 30, 0.8);
  border-color: rgba(255,255,255,0.12);
}

.contact-action-btn {
  background: transparent;
  border: none;
  padding: 4px;
  cursor: pointer;
  color: rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color var(--motion-fast) var(--ease-standard);
}

.contact-action-btn:hover {
  color: white;
}

.contact-action-btn.delete-btn:hover {
  color: var(--danger);
}

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 40px 20px;
  text-align: center;
}

.empty-icon {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(29, 78, 216, 0.1);
  border: 2px solid rgba(29, 78, 216, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(148, 163, 184, 0.8);
}

.empty-icon svg {
  width: 32px;
  height: 32px;
}

.empty-text {
  font-size: 16px;
  font-weight: 600;
  color: var(--fg);
  margin: 0;
}

.empty-subtext {
  font-size: 14px;
  color: var(--muted);
  margin: 0;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(2px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active {
  display: flex;
}

.modal-dialog {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 20px;
  width: calc(100% - 32px);
  max-width: 280px;
  margin: 16px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
  animation: slideUp 300ms var(--ease-standard) forwards;
}

@keyframes slideUp {
  from {
    transform: translateY(40px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.modal-dialog h3 {
  font-size: var(--text-lg);
  font-weight: 700;
  color: var(--fg);
  margin: 0 0 16px;
  font-family: var(--font-display);
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 12px;
}

.modal-dialog .form-group:last-of-type {
  margin-bottom: 0;
}

.form-group label {
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--muted);
}

.form-group input {
  width: 100%;
  box-sizing: border-box;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: rgba(255,255,255,0.02);
  color: var(--fg);
  font-family: inherit;
  font-size: 14px;
  transition: all var(--motion-fast) var(--ease-standard);
}

.form-group input:focus {
  outline: none;
  border-color: var(--accent);
  background: rgba(29, 78, 216, 0.1);
  box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.2), inset 0 0 4px rgba(29, 78, 216, 0.15);
}

.modal-buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.modal-btn {
  flex: 1;
  padding: 12px;
  border-radius: var(--radius-lg);
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  font-size: 14px;
  transition: all var(--motion-base) var(--ease-standard);
}

.modal-btn.primary {
  background: var(--accent);
  color: white;
}

.modal-btn.primary:active {
  transform: scale(0.95);
}

.modal-btn.secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg);
}

.modal-btn.secondary:hover {
  background: rgba(255,255,255,0.04);
}

.modal-btn.secondary:active {
  transform: scale(0.95);
}

.android-nav {
  display: none;
  justify-content: center;
  gap: 24px;
  padding: 6px 20px 8px;
  flex-shrink: 0;
  background: rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(12px);
}

.android-nav svg {
  width: 16px;
  height: 16px;
  color: rgba(255,255,255,0.35);
}
@media (max-width: 430px) {
  body { align-items: stretch; background: var(--bg); }
  .phone {
    width: 100vw;
    height: 100vh;
    border-radius: 0;
    box-shadow: none;
  }
}
</style>
</head>
<body>
<div class="phone">
  <div class="punch-hole"></div>
  <div class="status-bar">
    <span class="time">14:38</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M1 9l4 4-4 4"/><path d="M7 17l4-4-4-4"/><rect x="11" y="5" width="10" height="14" rx="2"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h12"/></svg>
    </div>
  </div>

  <div class="page-header">
    <button class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="page-title">
      <img class="page-logo" src="../assets/brand/videogo-icon-192.png" alt="" aria-hidden="true">
      <h1>Contactos SOS</h1>
    </div>
    <button class="add-btn" id="addContactBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Agregar
    </button>
  </div>

  <div class="content-scroll" id="contactsList"></div>

  <!-- Modal para agregar/editar contacto -->
  <div class="modal-overlay" id="contactModal">
    <div class="modal-dialog">
      <h3 id="modalTitle">Agregar contacto</h3>
      <form id="contactForm">
        <div class="form-group">
          <label for="contactName">Nombre</label>
          <input type="text" id="contactName" placeholder="Ej: María García" required>
        </div>
        <div class="form-group">
          <label for="contactPhone">Teléfono</label>
          <input type="tel" id="contactPhone" placeholder="Ej: +34 123 456 789" required>
        </div>
        <div class="modal-buttons">
          <button type="button" class="modal-btn secondary" id="cancelModalBtn">Cancelar</button>
          <button type="submit" class="modal-btn primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="android-nav">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="15 3 6 12 15 21 15 21"/></svg>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="10"/></svg>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="9 21 18 12 9 3 9 3"/></svg>
  </div>
</div>

<script src="../js/storage.js"></script>
<script src="../js/contacts.js"></script>
<script src="../js/ui.js"></script>
<script>
const backBtn = document.getElementById('backBtn');
const addContactBtn = document.getElementById('addContactBtn');
const contactsList = document.getElementById('contactsList');
const contactModal = document.getElementById('contactModal');
const modalTitle = document.getElementById('modalTitle');
const contactForm = document.getElementById('contactForm');
const contactNameInput = document.getElementById('contactName');
const contactPhoneInput = document.getElementById('contactPhone');
const cancelModalBtn = document.getElementById('cancelModalBtn');

let editingContactId = null;

// Renderizar lista inicial
function renderContacts() {
  Contacts.renderList('contactsList', {
    editable: true,
    onEdit: (contact) => {
      editingContactId = contact.id;
      modalTitle.textContent = 'Editar contacto';
      contactNameInput.value = contact.name;
      contactPhoneInput.value = contact.phone;
      contactModal.classList.add('active');
    },
    onDelete: () => {
      renderContacts();
    }
  });

  // Si no hay contactos, mostrar empty state
  const contacts = Storage.getContacts();
  if (contacts.length === 0) {
    contactsList.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <p class="empty-text">Sin contactos SOS</p>
        <p class="empty-subtext">Agrega contactos de confianza para emergencias</p>
      </div>
    `;
  }
}

// Back button
backBtn.addEventListener('click', () => {
  window.location.href = '06-configuracion.html';
});

// Add contact button
addContactBtn.addEventListener('click', () => {
  editingContactId = null;
  modalTitle.textContent = 'Agregar contacto';
  contactNameInput.value = '';
  contactPhoneInput.value = '';
  contactModal.classList.add('active');
  contactNameInput.focus();
});

// Cancel modal
cancelModalBtn.addEventListener('click', () => {
  contactModal.classList.remove('active');
});

// Form submit
contactForm.addEventListener('submit', (e) => {
  e.preventDefault();

  const name = contactNameInput.value.trim();
  const phone = contactPhoneInput.value.trim();

  if (!name || !phone) {
    UI.showToast('Por favor completa todos los campos');
    return;
  }

  if (editingContactId) {
    Storage.updateContact(editingContactId, name, phone);
    UI.showToast('Contacto actualizado');
  } else {
    Storage.addContact(name, phone);
    UI.showToast('Contacto agregado');
  }

  contactModal.classList.remove('active');
  renderContacts();
});

// Close modal on overlay click
contactModal.addEventListener('click', (e) => {
  if (e.target === contactModal) {
    contactModal.classList.remove('active');
  }
});

// Initialize
renderContacts();
</script>
</body>
</html>
