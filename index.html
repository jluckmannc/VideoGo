<!doctype html>
<html lang="es"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VídeoGo · Inicio</title>
<style>
:root {
  --bg: #0a0a14;
  --surface: #12121e;
  --fg: #f1f5f9;
  --muted: #94a3b8;
  --border: rgba(255,255,255,0.06);
  --accent: #1d4ed8;
  --accent-on: #ffffff;
  --accent-hover: #2563eb;
  --accent-active: #1e40af;
  --danger: #dc2626;
  --success: #16a34a;
  --punch-hole: #000000;
  --recording-red: #dc2626;
  --font-display: "Geist","Geist Sans",-apple-system,system-ui,"Segoe UI",Arial,sans-serif;
  --font-body: "Geist","Geist Sans",-apple-system,system-ui,"Segoe UI",Arial,sans-serif;
  --font-mono: "Fira Code",ui-monospace,"SF Mono","JetBrains Mono",Menlo,Monaco,Consolas,monospace;
  --text-xs: 12px;
  --text-sm: 14px;
  --text-base: 16px;
  --text-lg: 20px;
  --text-xl: 24px;
  --leading-body: 1.5;
  --leading-tight: 1.2;
  --tracking-display: -0.02em;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-pill: 9999px;
  --motion-fast: 150ms;
  --motion-base: 200ms;
  --ease-standard: cubic-bezier(0.2,0,0,1);
}
*,*::before,*::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0; min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  background: #05050e;
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}
.phone {
  width: 390px; height: 844px;
  background: #0a0a14;
  border-radius: 28px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15),0 0 0 1px rgba(0,0,0,0.06);
  display: flex; flex-direction: column; position: relative;
}
.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 24px 8px;
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.9);
  flex-shrink: 0; position: relative; z-index: 5;
}
.status-icons { display: flex; gap: 6px; align-items: center; }
.status-icons svg { width: 16px; height: 16px; stroke: rgba(255,255,255,0.9); }
.punch-hole {
  width: 10px; height: 10px;
  background: var(--punch-hole); border-radius: 50%;
  position: absolute; top: 16px; left: 50%; margin-left: -5px; z-index: 6;
}
.camera-area {
  flex: 1; position: relative; overflow: hidden;
  display: flex; align-items: stretch;
}
.viewfinder {
  position: absolute; inset: 0; z-index: 0;
  transition: filter var(--motion-base) var(--ease-standard);
}
.phone.front-cam .viewfinder { filter: sepia(0.08) hue-rotate(-10deg); }
.viewfinder-bg {
  position: absolute; inset: 0;
  background: linear-gradient(180deg,
    #4a80c0 0%,
    #7ab0e0 16%,
    #6a9a4a 20%,
    #4a6a2a 26%,
    #3a3a2a 30%,
    #3a3a3a 36%,
    #2a2a2a 44%,
    #1a1a1a 54%,
    #12121e 70%,
    #0e0e20 100%
  );
}
.viewfinder::after {
  content: ''; position: absolute; inset: 0;
  background:
    repeating-linear-gradient(90deg, transparent 0%, transparent 49%, rgba(255,255,255,0.025) 49%, rgba(255,255,255,0.025) 51%, transparent 51%, transparent 100%),
    repeating-linear-gradient(0deg, transparent 0%, transparent 3.5%, rgba(255,255,255,0.015) 3.5%, rgba(255,255,255,0.015) 4%, transparent 4%, transparent 100%);
  pointer-events: none;
}
.dash-silhouette {
  position: absolute; bottom: 0; left: 0; right: 0; height: 32%;
  background: linear-gradient(180deg, transparent 0%, rgba(8,8,18,0.3) 25%, rgba(8,8,18,0.65) 55%, rgba(6,6,16,0.9) 100%);
  z-index: 1; pointer-events: none;
}
.camera-overlay {
  position: absolute; inset: 0; z-index: 2;
  display: flex; flex-direction: column;
}
.cam-top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; flex-shrink: 0;
}
.cam-brand {
  display: flex; align-items: center; gap: 8px;
  opacity: 0.65;
  transition: opacity var(--motion-fast) var(--ease-standard);
}
.cam-brand svg { width: 18px; height: 18px; color: rgba(255,255,255,0.75); }
.cam-brand span {
  font-family: var(--font-display);
  font-size: 13px; font-weight: 600;
  color: rgba(255,255,255,0.75);
  letter-spacing: var(--tracking-display);
}
.cam-top-right { display: flex; gap: 8px; align-items: center; }
.flip-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: none; background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: background var(--motion-fast) var(--ease-standard);
  color: rgba(255,255,255,0.8);
}
.flip-btn:hover { background: rgba(0,0,0,0.55); }
.flip-btn:active { transform: scale(0.92); }
.flip-btn svg { width: 20px; height: 20px; }
.flip-bottom {
  position: absolute; bottom: 24px; right: 20px; z-index: 3;
  transition: opacity var(--motion-base) var(--ease-standard);
}
.idle-content {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; padding: 60px 20px;
  transition: opacity var(--motion-base) var(--ease-standard);
}
.record-btn {
  width: 120px; height: 120px; border-radius: 50%;
  border: 4px solid var(--recording-red);
  background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: transform var(--motion-fast) var(--ease-standard);
  position: relative;
}
.record-btn::before {
  content: ''; position: absolute; inset: -10px; border-radius: 50%;
  border: 2px solid rgba(220,38,38,0.25);
  animation: ring-pulse 2s ease-out infinite;
}
@keyframes ring-pulse {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(1.3); opacity: 0; }
}
.record-btn:hover { transform: scale(1.04); }
.record-btn:active { transform: scale(0.96); }
.record-btn-inner {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--recording-red);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 24px color-mix(in oklab, var(--recording-red) 45%, transparent);
}
.record-btn-inner svg { width: 32px; height: 32px; color: white; }
.record-label {
  font-size: var(--text-lg); font-weight: 600;
  color: rgba(255,255,255,0.9);
  margin: 0; text-shadow: 0 1px 6px rgba(0,0,0,0.4);
}
.phone.recording .idle-content { opacity: 0; pointer-events: none; }
.phone.recording .flip-bottom { opacity: 0; pointer-events: none; }
.phone.recording .cam-brand { opacity: 0; pointer-events: none; }
.rec-info {
  position: absolute; top: 12px; left: 20px; z-index: 4;
  display: none; align-items: center; gap: 10px;
}
.phone.recording .rec-info { display: flex; }
.rec-indicator {
  display: flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
  padding: 4px 10px 4px 7px; border-radius: var(--radius-pill);
}
.rec-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--recording-red);
  animation: pulse-dot 1.2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; }
  50% { opacity: 0.35; }
}
.rec-badge {
  font-size: 10px; font-weight: 700; color: white;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.rec-timer {
  font-family: var(--font-mono);
  font-size: 12px; color: rgba(255,255,255,0.8);
  font-variant-numeric: tabular-nums;
}
.cam-label-idle {
  position: absolute; bottom: 72px; left: 50%;
  transform: translateX(-50%); z-index: 3;
  font-size: 10px; font-weight: 500;
  color: rgba(255,255,255,0.35);
  pointer-events: none;
  letter-spacing: 0.03em;
  transition: opacity var(--motion-base) var(--ease-standard);
}
.phone.recording .cam-label-idle { opacity: 0; }
.cam-label-rec {
  position: absolute; bottom: 96px; left: 50%;
  transform: translateX(-50%); z-index: 3;
  font-size: 10px; font-weight: 500;
  color: rgba(255,255,255,0.3);
  pointer-events: none; display: none;
  letter-spacing: 0.03em;
}
.phone.recording .cam-label-rec { display: block; }
.rec-controls {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
  padding: 24px 20px 20px;
  display: none; flex-direction: column; align-items: center;
  background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.65) 100%);
}
.phone.recording .rec-controls { display: flex; }
.rec-actions {
  display: flex; align-items: center;
  justify-content: center; gap: 36px; width: 100%;
}
.ctrl-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: none; border: none; cursor: pointer;
  padding: 4px; color: rgba(255,255,255,0.65);
  transition: color var(--motion-fast) var(--ease-standard);
  font-family: inherit;
}
.ctrl-btn:hover { color: white; }
.ctrl-btn svg { width: 22px; height: 22px; }
.ctrl-btn span { font-size: 10px; font-weight: 500; }
.stop-btn {
  width: 64px; height: 64px; border-radius: 50%;
  border: 3px solid var(--recording-red);
  background: rgba(0,0,0,0.25); backdrop-filter: blur(4px);
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: transform var(--motion-fast) var(--ease-standard);
}
.stop-btn:active { transform: scale(0.92); }
.stop-btn-inner { width: 44px; height: 44px; border-radius: 6px; background: var(--recording-red); }
.marcar-btn {
  width: 52px; height: 52px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.25); backdrop-filter: blur(4px);
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: background var(--motion-fast) var(--ease-standard), transform var(--motion-fast) var(--ease-standard);
  position: relative;
}
.marcar-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.12); }
.marcar-btn svg { width: 20px; height: 20px; color: rgba(255,255,255,0.9); }
.marcar-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.toast {
  position: absolute; bottom: -34px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
  color: white; font-size: 11px; font-weight: 500;
  padding: 6px 14px; border-radius: var(--radius-pill);
  white-space: nowrap; opacity: 0;
  transition: opacity 200ms ease, transform 200ms ease;
  pointer-events: none; z-index: 5;
}
.show-toast .toast { opacity: 1; transform: translateX(-50%) translateY(0); }
.bottom-nav {
  display: flex; border-top: none;
  padding: 8px 0 10px; flex-shrink: 0;
  background: rgba(0,0,0,0.45); backdrop-filter: blur(12px);
  position: relative; z-index: 4;
  transition: opacity var(--motion-base) var(--ease-standard);
}
.phone.recording .bottom-nav { opacity: 0.2; pointer-events: none; }
.bottom-nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 2px;
  padding: 8px 0; cursor: pointer;
  color: rgba(255,255,255,0.45);
  transition: color var(--motion-fast) var(--ease-standard);
  border: none; background: none; font-family: inherit;
}
.bottom-nav-item.active { color: white; }
.bottom-nav-item svg { width: 24px; height: 24px; color: rgba(255,255,255,0.45); }
.bottom-nav-item.active svg { color: white; }
.bottom-nav-item span { font-size: 10px; font-weight: 500; }
.android-nav {
  display: flex; justify-content: center; gap: 24px;
  padding: 6px 20px 8px; flex-shrink: 0;
  background: rgba(0,0,0,0.25); backdrop-filter: blur(12px);
  position: relative; z-index: 4;
}
.segment-badge {
  display: none; align-items: center; gap: 4px;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
  padding: 4px 10px; border-radius: var(--radius-pill);
  font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.85);
  font-family: var(--font-mono); font-variant-numeric: tabular-nums;
}
.phone.recording .segment-badge { display: flex; }
.segment-flash {
  position: absolute; inset: 0; z-index: 10;
  background: white; opacity: 0; pointer-events: none;
  transition: opacity 0s;
}
.segment-flash.active { opacity: 0.15; transition: opacity 0s; }
.segment-flash.fade { opacity: 0; transition: opacity 300ms ease-out; }
@keyframes flash-pop {
  0% { transform: scale(0.9); opacity: 0; }
  40% { transform: scale(1.05); opacity: 1; }
  100% { transform: scale(1); opacity: 0; }
}
.flash-msg {
  position: absolute; top: 50%; left: 50%; z-index: 11;
  transform: translate(-50%,-50%);
  display: none; pointer-events: none;
}
.flash-msg.active { display: block; animation: flash-pop 600ms ease-out forwards; }
.flash-msg span {
  display: block;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
  color: white; font-size: 13px; font-weight: 600;
  padding: 10px 20px; border-radius: var(--radius-pill);
  white-space: nowrap;
}
.android-nav svg { width: 16px; height: 16px; color: rgba(255,255,255,0.35); }
</style>
</head>

<script>
const app = document.getElementById('app');
const startBtn = document.getElementById('startRecordBtn');
const stopBtn = document.getElementById('stopRecordBtn');
const marcarBtn = document.getElementById('marcarBtn');
const marcarWrapper = document.getElementById('marcarWrapper');
const flipBtn = document.getElementById('flipCameraBtn');
const flipBtn2 = document.getElementById('flipCameraBtn2');
const camLabelIdle = document.getElementById('camLabelIdle');
const camLabelRec = document.getElementById('camLabelRec');
const segmentBadge = document.getElementById('segmentBadge');
const segmentFlash = document.getElementById('segmentFlash');
const flashMsg = document.getElementById('flashMsg');
const flashMsgText = document.getElementById('flashMsgText');
let isRearCamera = true;
let segmentCount = 1;

startBtn.addEventListener('click', () => {
  segmentCount = 1;
  segmentBadge.textContent = 'Seg. 1';
  app.classList.add('recording');
});

stopBtn.addEventListener('click', () => {
  app.classList.remove('recording');
});

marcarBtn.addEventListener('click', () => {
  segmentCount++;
  segmentBadge.textContent = `Seg. ${segmentCount}`;

  segmentFlash.classList.remove('fade', 'active');
  void segmentFlash.offsetWidth;
  segmentFlash.classList.add('active');
  setTimeout(() => {
    segmentFlash.classList.add('fade');
    segmentFlash.classList.remove('active');
  }, 50);

  flashMsgText.textContent = `✓ Segmento #${segmentCount} iniciado`;
  flashMsg.classList.remove('active');
  void flashMsg.offsetWidth;
  flashMsg.classList.add('active');
  setTimeout(() => flashMsg.classList.remove('active'), 600);

  marcarWrapper.classList.add('show-toast');
  setTimeout(() => marcarWrapper.classList.remove('show-toast'), 1500);
});

function toggleCamera() {
  isRearCamera = !isRearCamera;
  const label = isRearCamera ? 'Cámara trasera' : 'Cámara frontal';
  camLabelIdle.textContent = label;
  camLabelRec.textContent = label;
  app.classList.toggle('front-cam', !isRearCamera);
}
flipBtn.addEventListener('click', toggleCamera);

if (window.location.search.includes('mode=recording')) {
  segmentCount = 1;
  segmentBadge.textContent = 'Seg. 1';
  app.classList.add('recording');
}
</script>
</body></html>
